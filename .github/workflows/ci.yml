name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  data_load:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'data_load' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data_load
        run: |
          mkdir -p artifacts/data_load
          python -m src.data_load > artifacts/data_load/run.log 2>&1

      - name: Upload data_load artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_load
          path: artifacts/data_load

  data_quality_analysis:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'data_quality_analysis' }}
    runs-on: ubuntu-latest
    needs: data_load

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data_quality_analysis
        run: |
          mkdir -p artifacts/data_quality_analysis
          python -m src.data_quality_analysis > artifacts/data_quality_analysis/run.log 2>&1

      - name: Upload quality report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_quality_analysis
          path: artifacts/data_quality_analysis

      - name: Upload processed dataset
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/costs-clean.csv

  data_research:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'data_research' }}
    runs-on: ubuntu-latest
    needs: data_quality_analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed

      - name: Run data_research
        run: |
          mkdir -p artifacts/data_research
          python -m src.data_research > artifacts/data_research/run.log 2>&1

      - name: Upload research report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_research
          path: artifacts/data_research

      - name: Upload research tables
        uses: actions/upload-artifact@v4
        with:
          name: research-tables
          path: data/research-tables

  visualization:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'visualization' }}
    runs-on: ubuntu-latest
    needs: data_research

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download research tables
        uses: actions/download-artifact@v4
        with:
          name: research-tables
          path: data/research-tables

      - name: Run visualization
        run: |
          mkdir -p artifacts/visualization
          python -m src.visualization > artifacts/visualization/run.log 2>&1
        
      - name: Upload visualization artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization
          path: artifacts/visualization