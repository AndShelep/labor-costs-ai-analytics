name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  stage1:
    name: Stage 1 - ${{ matrix.module }}
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'data_load' || github.event.inputs.module == 'data_quality_analysis' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run module
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          python -m src.${{ matrix.module }} > artifacts/${{ matrix.module }}/run.log 2>&1

      - name: Upload data_load artifacts
        if: ${{ matrix.module == 'data_load' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_load
          path: artifacts/data_load

      - name: Upload quality report artifacts
        if: ${{ matrix.module == 'data_quality_analysis' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_quality_analysis
          path: artifacts/data_quality_analysis

      - name: Upload processed dataset
        if: ${{ matrix.module == 'data_quality_analysis' }}
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/costs-clean.csv

  data_research:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'data_research' }}
    runs-on: ubuntu-latest
    needs: stage1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare processed data directory
        run: mkdir -p data/processed

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed

      - name: Run data_research
        run: |
          mkdir -p artifacts/data_research
          python -m src.data_research > artifacts/data_research/run.log 2>&1

      - name: Upload research report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_research
          path: artifacts/data_research

      - name: Upload research tables
        uses: actions/upload-artifact@v4
        with:
          name: research-tables
          path: data/research-tables

  visualization:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'visualization' }}
    runs-on: ubuntu-latest
    needs: data_research

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare research tables directory
        run: mkdir -p data/research-tables

      - name: Download research tables
        uses: actions/download-artifact@v4
        with:
          name: research-tables
          path: data/research-tables

      - name: Run visualization
        run: |
          mkdir -p artifacts/visualization
          python -m src.visualization > artifacts/visualization/run.log 2>&1

      - name: Upload visualization artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization
          path: artifacts/visualization

  pages_prepare:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: visualization

    steps:
      - name: Prepare site directory
        run: mkdir -p site

      - name: Download visualization artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-visualization
          path: site

      - name: Create index.html
        run: |
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Labor Costs Visualization</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                max-width: 1100px;
                margin: 40px auto;
                padding: 0 20px;
                line-height: 1.5;
              }
              h1, h2, p {
                text-align: center;
              }
              img {
                display: block;
                max-width: 100%;
                height: auto;
                margin: 20px auto 40px auto;
                border: 1px solid #ccc;
              }
            </style>
          </head>
          <body>
            <h1>Labor Costs Analytics</h1>
            <p>Visualization results published with GitHub Pages</p>
          
            <h2>Q1 Ukraine Trend</h2>
            <img src="q1_ukraine_trend.png" alt="Q1 Ukraine Trend">
          
            <h2>Q1 Year-over-Year Change</h2>
            <img src="q1_ukraine_yoy_change.png" alt="Q1 YoY Change">
          
            <h2>Top 5 Regions</h2>
            <img src="q2_top5_regions.png" alt="Top 5 Regions">
          
            <h2>Bottom 5 Regions</h2>
            <img src="q2_bottom5_regions.png" alt="Bottom 5 Regions">
          
            <h2>Max vs Min</h2>
            <img src="q2_extremes_max_min.png" alt="Max vs Min">
          
            <h2>Crisis Years</h2>
            <img src="q3_crisis_mean_change.png" alt="Crisis Years">
          
            <h2>ARIMA Forecast</h2>
            <img src="arima_ukraine_forecast.png" alt="ARIMA Forecast">
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy_pages:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: pages_prepare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4