name: CI (self-hosted)

on:
  workflow_dispatch:

jobs:
  run-data-load-local:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          python3 --version
          pip3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Run data_load
        run: |
          mkdir -p artifacts/data_load
          python3 -m src.data_load > artifacts/data_load/run.log 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_load-selfhosted
          path: artifacts/data_load