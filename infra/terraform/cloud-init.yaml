#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - ca-certificates
  - curl
  - gnupg

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  - mkdir -p /home/azureuser/app
  - git clone ${repo_url} /home/azureuser/app
  - cd /home/azureuser/app && docker compose -f compose.yaml up --build -d