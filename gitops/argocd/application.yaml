apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: labor-app
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: labor-app
  source:
    repoURL: https://github.com/AndShelep/labor-costs-ai-analytics.git
    targetRevision: main
    path: gitops/app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true